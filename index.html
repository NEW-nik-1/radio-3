/* ----------------- ВЕРХНЕЕ МЕНЮ ----------------- */
.top-menu {
    display: flex;
    gap: 50px;
    margin: 0; /* убрали отступ сверху и снизу */
}

.menu-group {
    position: relative;
}

.menu-button {
    position: relative;
    padding: 8px 20px 8px 12px;
    min-width: 180px;
    height: 40px;
    background: linear-gradient(145deg, #d6d6d6, #f0f0f0);
    color: #333;
    font-size: 14px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    box-shadow: 4px 4px 8px rgba(0,0,0,0.2), -3px -3px 6px rgba(255,255,255,0.5);
    transition: all 0.2s ease;
}

.menu-button::after {
    content: '▾';
    position: absolute;
    right: 12px;
    top: 50%;
    transform: translateY(-50%);
    transition: transform 0.2s ease;
    color: #666;
}

.dropdown {
    position: absolute;
    top: 110%;
    left: 0;
    background: linear-gradient(145deg, #ffffff, #f0f0f0);
    border-radius: 8px;
    flex-direction: column;
    min-width: 220px;
    box-shadow: 6px 6px 12px rgba(0,0,0,0.3), -3px -3px 6px rgba(255,255,255,0.5);
    overflow: hidden;
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.3s ease, visibility 0.3s ease;
    z-index: 999;
}

.menu-group.active .dropdown {
    opacity: 1;
    visibility: visible;
}

.menu-group.active .menu-button::after {
    transform: translateY(-50%) rotate(180deg);
}

.menu-item {
    padding: 10px;
    border: none;
    background: transparent;
    text-align: left;
    font-size: 14px;
    cursor: pointer;
    transition: all 0.2s ease;
    border-radius: 6px;
}

.menu-item:hover,
.menu-item:focus,
.menu-item:active {
    background: linear-gradient(145deg, #e0e0e0, #f0f0f0);
}

<!-- ----------------- Медленное открытие/закрытие меню ----------------- -->
<script>
document.querySelectorAll('.menu-group').forEach(group => {
    let timer;
    group.addEventListener('mouseenter', () => {
        clearTimeout(timer);
        group.classList.add('active');
    });
    group.addEventListener('mouseleave', () => {
        timer = setTimeout(() => {
            group.classList.remove('active');
        }, 400);
    });
});
