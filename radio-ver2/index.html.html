<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Radio FINAL + CHAT FIX</title>

<style>
:root{
  --border:#d0d0d0;
  --btn:#2f2f2f;
  --btn2:#444;
  --panel:#2a2a2a;
  --accent:#00bfa5;
}

body{
  margin:0;
  display:flex;
  justify-content:center;
  background:#fff;
  font-family:Arial;
  color:#111;
}

.wrapper{
  width:100%;
  max-width:850px;
  padding:10px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

/* PLAYER */
.player{
  display:flex;
  align-items:center;
  gap:8px;
  height:56px;
  padding:6px 10px;
  border-radius:10px;
  border:1px solid var(--border);
}

button{
  background:var(--btn);
  border:1px solid #555;
  color:#fff;
  border-radius:50%;
  cursor:pointer;
  width:36px;
  height:36px;
  display:flex;
  align-items:center;
  justify-content:center;
}

button:hover{background:var(--btn2);}

.left-controls{
  display:flex;
  gap:6px;
  align-items:center;
  position:relative;
}

.color-panel{
  display:flex;
  align-items:center;
  gap:6px;
  font-size:10px;
}

.color-panel input{
  width:22px;
  height:22px;
  border:none;
}

.dropdown{
  position:absolute;
  top:55px;
  left:0;
  background:var(--panel);
  border:1px solid #555;
  border-radius:10px;
  display:flex;
  flex-direction:column;
  min-width:160px;
  z-index:9999;
}

.dropdown a{
  padding:8px;
  color:#fff;
  text-decoration:none;
  font-size:12px;
}

.hidden{display:none;}

.center{
  flex:1;
  display:flex;
  flex-direction:column;
  gap:3px;
}

canvas{
  width:100%;
  height:40px;
  background:#fff;
  border:1px solid var(--border);
  border-radius:6px;
}

.track{
  font-size:10px;
  overflow:hidden;
  white-space:nowrap;
}

.track-inner{
  display:inline-block;
  padding-left:100%;
  animation:scroll 12s linear infinite;
}

@keyframes scroll{
  0%{transform:translateX(0);}
  100%{transform:translateX(-100%);}
}

.right{
  display:flex;
  flex-direction:column;
  font-size:10px;
  min-width:180px;
}

#volume{
  writing-mode:bt-lr;
  -webkit-appearance:slider-vertical;
  height:42px;
  accent-color:var(--accent);
}

/* EQ */
.eq-window{
  position:fixed;
  bottom:10px;
  left:50%;
  transform:translateX(-50%);
  width:95%;
  max-width:800px;
  background:var(--panel);
  border:1px solid #555;
  border-radius:10px;
  padding:10px;
  display:none;
  z-index:9999;
  color:#fff;
}

/* CHAT */
.chat-box{
  width:100%;
  height:100px;          /* 👈 ВЫСОТА */
  border:1px solid var(--border);
  border-radius:10px;
  overflow:hidden;
  position:relative;
}

/* 👇 ВАЖНО — принудительно растягиваем iframe */
.chat-box iframe{
  width:100% !important;
  height:100% !important;
  min-height:100px !important;
}

@media (max-width:600px){
  .chat-box,
  .chat-box iframe{
    height:300px !important;
    min-height:300px !important;
  }
}

/* AUTHOR */
.author{
  position:fixed;
  bottom:6px;
  left:10px;
  font-size:9px;
}

</style>
</head>

<body>

<div class="wrapper">

<div class="player">

  <div class="left-controls">
    <button id="toggleBtn">▶</button>
    <button id="menuBtn">🌐</button>
    <button id="eqBtn">EQ</button>

    <div class="color-panel">
      <input type="color" id="lowColor" value="#00bfa5">
      <input type="color" id="midColor" value="#4da6ff">
      <input type="color" id="highColor" value="#ff4d4d">
    </div>

    <div id="menu" class="dropdown hidden">
      <a href="https://volnorez.com/pyl_dorog-f">Сайт</a>
      <a href="https://m.volnorez.com/pyl_dorog-fm">Моб версия</a>
    </div>

  </div>

  <div class="center">
    <canvas id="viz"></canvas>
    <div class="track">
      <div id="trackText" class="track-inner">Ожидание...</div>
    </div>
  </div>

  <div class="right">
    <div>🎙 <span id="dj">LIVE</span></div>
    <div>👥 <span id="listeners">0</span></div>
    <div>📡 <span id="status">OFF</span></div>
  </div>

  <input id="volume" type="range" min="0" max="1" step="0.01">

  <audio id="audio"></audio>

</div>

<!-- 👇 ЧАТ -->
<div id="volnorez_chat"
     class="chat-box"
     data-code="001e157d"
     data-skin="skin_4">
 <script async src="//volnorez.com/plugins/jscode/chat_js"></script>
</div>

</div>

<script>
/* 🔥 ФИКС ВЫСОТЫ ЧАТА (ВАЖНО) */
setTimeout(()=>{
  const iframe=document.querySelector("#volnorez_chat iframe");
  if(iframe){
    iframe.style.height="100px";
    iframe.style.width="100%";
  }
},1500);
</script>

</body>
</html>
