<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>ПыЛь_ДоРоГ FM</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      overflow: hidden;
    }

    body {
      background: linear-gradient(145deg, #e0e0e0, #c0c0c0);
      font-family: Arial;
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100vh;
    }

    /* ---------------- LOADER ---------------- */
    #loader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: #cfcfcf;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 99999;
      transition: opacity 0.6s ease;
    }

    #loader img {
      width: auto;
      height: auto;
      animation: pulse 1.2s 1 ease-in-out;
    }

    @keyframes pulse {
      0% { transform: scale(1); opacity: 0.7; }
      50% { transform: scale(1.1); opacity: 1; }
      100% { transform: scale(1); opacity: 0.7; }
    }

    #loader.hide {
      opacity: 0;
      pointer-events: none;
    }

    /* ---------------- КНОПКИ ---------------- */
    button {
      width: 44px;
      height: 44px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-sizing: border-box;
    }

    /* ---------------- КОНТРОЛЫ ---------------- */
    .controls {
      display: flex;
      gap: 15px;
      margin-top: 0px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
    }

    /* ---------------- ВИЗУАЛИЗАТОР ---------------- */
    #visualizer {
      width: 250px;
      height: 60px;
      background: transparent;
    }

    /* ---------------- ЦВЕТА ---------------- */
    .color-controls {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .color-input {
      width: 26px;
      height: 26px;
      border: none;
      padding: 0;
      border-radius: 50%;
      cursor: pointer;
    }

    .color-input::-webkit-color-swatch-wrapper {
      padding: 0;
    }

    .color-input::-webkit-color-swatch {
      border: none;
      border-radius: 50%;
    }

    .color-box {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .color-label {
      font-size: 10px;
      color: #444;
      margin-bottom: 2px;
      opacity: 0.7;
    }

    /* ---------------- МЕНЮ ---------------- */
    .menu {
      position: relative;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .menu-list {
      position: absolute;
      top: 50px;
      left: -150px;
      width: 210px;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 10px;
      padding: 10px;
      display: block;
      opacity: 0;
      transform: translateY(-10px) scale(0.95);
      pointer-events: none;
      transition: all 0.35s ease;
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
      z-index: 9999;
    }

    .menu-list.open {
      opacity: 1;
      transform: translateY(0) scale(1);
      pointer-events: auto;
    }

    .menu-list a {
      display: block;
      padding: 8px 10px;
      margin: 5px 0;
      border-radius: 8px;
      text-decoration: none;
      color: #222;
      font-size: 14px;
      background: rgba(0, 0, 0, 0.05);
      transition: 0.2s;
    }

    .menu-list a:hover {
      background: rgba(0, 0, 0, 0.12);
      transform: translateX(3px);
    }

    /* ---------------- ЭКВАЛАЙЗЕР ---------------- */
    .eq-window {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 95%;
      max-width: 900px;
      background: #8f8f8f;
      color: #fff;
      border-radius: 10px;
      padding: 15px;
      display: none;
      z-index: 10000;
      overflow-x: auto;
    }

    .eq-sliders {
      display: flex;
      justify-content: center;
      gap: 10px;
      align-items: flex-end;
      flex-wrap: nowrap;
    }

    .eq-sliders div {
      display: flex;
      flex-direction: column;
      align-items: center;
      min-width: 45px;
    }

    .eq-sliders input {
      height: 100px;
      width: 20px;
      -webkit-appearance: slider-vertical;
    }

    /* ---------------- ЧАТ ---------------- */
    #volnorez_chat {
      width: 900px;
      max-width: 90%;
      height: 100px;
      margin: 0;
      background: linear-gradient(145deg, #e8e8e8, #d6d6d6);
      border-radius: 12px;
      box-shadow: 6px 6px 12px rgba(0, 0, 0, 0.3),
                  -3px -3px 6px rgba(255, 255, 255, 0.5);
      overflow: hidden;
    }

    /* ---------------- AUTHOR ---------------- */
    .author {
      width: 900px;
      max-width: 90%;
      font-size: 12px;
      color: #555;
      opacity: 0.5;
      margin: 5px auto 0;
      text-align: left;
      cursor: pointer;
    }

    .author:hover {
      color: #000;
      opacity: 1;
    }

    /* ---------------- ЛОГО ---------------- */
    #logoGif {
      width: 70px;
      height: 70px;
      border-radius: 60px;
      object-fit: cover;
    }
  </style>
</head>

<body>

      <a href="https://vk.com/dust_dorogfm" target="_blank">📢 Группа ПыЛь_ДоРоГ FM</a>

      <a href="https://vk.com/topic-227352123_52478122" target="_blank">📝 Книга жалоб</a>
      <a href="https://vk.com/topic-227352123_52496434" target="_blank">🎵 Стол заказов</a>
    </div>
  </div>

</div>

<audio id="radio" src="https://s05.volnorez.com/live-app/869683" crossorigin="anonymous"></audio>

<div id="volnorez_chat"
     data-code="001e157d"
     data-skin-params="'bg_clr':'222,222,222','panel_clr':'216,216,216','ib_clr':'250,250,250','msgbg_clr':'238,238,238','omsgbg_clr':'229,229,229','txt_clr':'18,18,18','b_clr':'145,145,145','icon_clr':'120,120,120','label_clr':'60,61,61','dj_clr':'63,191,7'"

</div>

<script>
vkBridge.send('VKWebAppInit');

/* LOADER */
window.addEventListener("load", () => {
  const loader = document.getElementById("loader");

  setTimeout(() => {
    loader.classList.add("hide");

    setTimeout(() => {
      loader.style.display = "none";
    }, 300);

  }, 300);
});
</script>

<!-- дальше твой JS без изменений -->
<script>
const menuBtn = document.getElementById('menuBtn');
const menuList = document.getElementById('menuList');

let menuTimer;

menuBtn.onclick = () => {
  menuList.classList.add('open');
  clearTimeout(menuTimer);

  menuTimer = setTimeout(() => {
    menuList.classList.remove('open');
  }, 6000);
};

menuList.onmouseenter = () => clearTimeout(menuTimer);

menuList.onmouseleave = () => {
  menuTimer = setTimeout(() => {
    menuList.classList.remove('open');
  }, 1200);
};
</script>

<div class="eq-window" id="eqWindow">
  <div style="display:flex; justify-content:space-between;">
    <span>Эквалайзер</span>
    <span id="closeEq" style="cursor:pointer">❌</span>
  </div>
  <div class="eq-sliders" id="eqSliders"></div>
</div>

<script>
const audio = document.getElementById('radio');
const btn = document.getElementById('playBtn');
const volume = document.getElementById('volume');

audio.volume = 0.5;

let ctx, analyser, dataArray, canvasCtx, filters=[];

btn.onclick = () => {
  if(audio.paused){
    audio.play();
    btn.textContent='⏸';
    initAudio();
  } else {
    audio.pause();
    btn.textContent='▶';
  }
};

volume.oninput = () => audio.volume = volume.value;

function initAudio(){
  if(ctx) return;

  ctx = new AudioContext();
  const source = ctx.createMediaElementSource(audio);
  analyser = ctx.createAnalyser();

  let prev = source;

  const freqs = [32,64,125,250,500,1000,2000,4000,8000,16000];

  freqs.forEach((f,i)=>{
    const filter = ctx.createBiquadFilter();
    filter.type='peaking';
    filter.frequency.value=f;
    filter.gain.value=0;
    prev.connect(filter);
    prev=filter;
    filters.push(filter);
  });

  prev.connect(analyser);
  analyser.connect(ctx.destination);

  analyser.fftSize=256;
  dataArray=new Uint8Array(analyser.frequencyBinCount);

  canvasCtx=document.getElementById('visualizer').getContext('2d');
  draw();
  createEQ(freqs);
}

function draw(){
  requestAnimationFrame(draw);
  if(!analyser) return;

  analyser.getByteFrequencyData(dataArray);

  const c1=document.getElementById('c1').value;
  const c2=document.getElementById('c2').value;
  const c3=document.getElementById('c3').value;

  canvasCtx.clearRect(0,0,420,120);

  for(let i=0;i<dataArray.length;i++){
    let h=dataArray[i]/2;

    let grad=canvasCtx.createLinearGradient(0,0,0,120);
    grad.addColorStop(0,c1);
    grad.addColorStop(0.5,c2);
    grad.addColorStop(1,c3);

    canvasCtx.fillStyle=grad;
    canvasCtx.fillRect(i*5,120-h,4,h);
  }
}

function createEQ(freqs){
  const wrap=document.getElementById('eqSliders');

  freqs.forEach((f,i)=>{
    const div=document.createElement('div');

    const label=document.createElement('span');
    label.textContent=f+'Hz';

    const s=document.createElement('input');
    s.type='range';
    s.min='-10';
    s.max='10';
    s.step='0.1';
    s.value='0';
    s.oninput=()=>filters[i].gain.value=s.value;

    div.appendChild(label);
    div.appendChild(s);
    wrap.appendChild(div);
  });
}

eqBtn.onclick=()=>eqWindow.style.display='block';
closeEq.onclick=()=>eqWindow.style.display='none';
</script>

</body>
